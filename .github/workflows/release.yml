name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to publish (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-ubuntu
            runs-on: ubuntu-latest
            container: cimg/rust:1.96
            arch: amd64
            shell: bash

          - target: linux-fedora
            runs-on: ubuntu-latest
            container: fedora:latest
            arch: x86_64
            shell: bash

          - target: linux-arch
            runs-on: ubuntu-latest
            container: rnestler/archlinux-rust:stable
            arch: x86_64
            shell: bash

          - target: windows
            runs-on: windows-latest
            arch: x86_64
            shell: pwsh

          - target: macos-x86_64
            runs-on: macos-13
            arch: x86_64
            shell: bash

          - target: macos-arm64
            runs-on: macos-14
            arch: arm64
            shell: bash

    steps:
      - name: Setup Rust toolchain
        if: matrix.container == ''
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup
        shell: ${{ matrix.shell }}
        env:
          ARCH: ${{ matrix.arch }}
        run: ./.github/scripts/setup-${{ matrix.target }}.${{ matrix.shell == 'pwsh' && 'ps1' || 'sh' }}

      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        shell: ${{ matrix.shell }}
        run: cargo build --release --locked

      - name: Package
        id: package
        shell: ${{ matrix.shell }}
        env:
          ARCH: ${{ matrix.arch }}
        run: ./.github/scripts/package-${{ matrix.target }}.${{ matrix.shell == 'pwsh' && 'ps1' || 'sh' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: asset-${{ matrix.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: asset-*
          path: dist
          merge-multiple: true

      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        continue-on-error: true
        with:
          app-id: ${{ secrets.RELEASE_GH_APP_ID }}
          private-key: ${{ secrets.RELEASE_GH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Show assets
        run: ls -lah dist

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign assets (keyless)
        run: |
          for file in dist/*; do
            cosign sign-blob --yes "$file" \
              --output-signature "${file}.sig" \
              --output-certificate "${file}.pem"
          done

      - name: Create or update release
        env:
          GH_REPO: ${{ github.repository }}
          GH_APP_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_WORKFLOW_TOKEN: ${{ github.token }}
        run: |
          publish_with_token() {
            local token="$1"
            GH_TOKEN="${token}" gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1 || \
            GH_TOKEN="${token}" gh release create "${RELEASE_TAG}" --repo "${GH_REPO}" --title "${RELEASE_TAG}" --generate-notes
            GH_TOKEN="${token}" gh release upload "${RELEASE_TAG}" dist/* --repo "${GH_REPO}" --clobber
          }

          # Prefer GitHub App token, but always fallback to workflow GITHUB_TOKEN if publish fails.
          if [ -n "${GH_APP_TOKEN}" ]; then
            echo "Publishing release using: GitHub App"
            if publish_with_token "${GH_APP_TOKEN}"; then
              exit 0
            fi
            echo "GitHub App token failed to publish release. Retrying with workflow GITHUB_TOKEN..."
          fi

          if [ -z "${GH_WORKFLOW_TOKEN}" ]; then
            echo "Workflow GITHUB_TOKEN is empty. Cannot publish release."
            exit 1
          fi

          echo "Publishing release using: Workflow GITHUB_TOKEN"
          publish_with_token "${GH_WORKFLOW_TOKEN}"
